[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
 -v
 --tb=short
 --html=reports/test_report.html
 --self-contained-html
 -ra
 --maxfail=5
markers =
 slow: 标记慢测试
 integration: 集成测试
 unit: 单元测试
 tk: TK运营相关测试
 drama: 短剧相关测试
junit_family = xunit2
log_cli = true
log_cli_level = INFO
timeout = 300
