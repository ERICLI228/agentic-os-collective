<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🛒 TK运营中心 - Agentic OS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;color:#f1f5f9;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
.header h1{font-size:28px;color:#38bdf8}
.back-btn{padding:10px 20px;background:#1e293b;color:#fff;border-radius:8px;text-decoration:none;border:1px solid #334155}
.back-btn:hover{background:#334155}
.main-btn{padding:12px 24px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:8px;margin-bottom:20px}
.main-btn:hover{transform:translateY(-2px)}
.category-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-bottom:30px}
.category-card{background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;border:1px solid #334155;cursor:pointer;transition:all .2s}
.category-card:hover{background:rgba(56,189,248,0.1);border-color:#38bdf8}
.category-header{display:flex;align-items:center;gap:10px;margin-bottom:15px}
.category-icon{font-size:28px}
.category-title{font-size:18px;font-weight:600;color:#38bdf8}
.page-list{display:flex;flex-direction:column;gap:8px}
.page-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;cursor:pointer;transition:all .2s}
.page-item:hover{background:rgba(56,189,248,0.15)}
.page-name{font-size:14px}
.page-link{color:#4ade80;text-decoration:none;font-size:12px;padding:4px 12px;background:rgba(74,222,128,0.2);border-radius:6px}
.page-link:hover{background:rgba(74,222,128,0.4)}
.status-bar{position:fixed;bottom:20px;right:20px;padding:10px 20px;background:#1e293b;border-radius:8px;border:1px solid #334155;font-size:12px;color:#94a3b8}
.status-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:8px}
</style>
</head>
<body>
<div class="header">
<a href="/" class="back-btn">🏠 返回指挥中心</a>
<h1>🛒 TK运营中心</h1>
</div>

<a href="http://localhost:3000/" target="_blank" class="main-btn">
<span>🎯</span> 打开TK主平台
</a>

<div class="category-grid">
<!-- 数据分析 -->
<div class="category-card">
<div class="category-header">
<span class="category-icon">📊</span>
<span class="category-title">数据分析</span>
</div>
<div class="page-list">
<a href="http://localhost:3000/dashboard.html" target="_blank" class="page-item">
<span class="page-name">📈 运营仪表盘</span>
<span class="page-link">访问</span>
</a>
<a href="http://localhost:3000/southeast-asia-3c-report.html" target="_blank" class="page-item">
<span class="page-name">🌏 东南亚3C报告</span>
<span class="page-link">访问</span>
</a>
<a href="http://localhost:3000/weekly-report.html" target="_blank" class="page-item">
<span class="page-name">📝 TK运营周报</span>
<span class="page-link">访问</span>
</a>
<a href="http://localhost:3000/status.html" target="_blank" class="page-item">
<span class="page-name">🔄 服务状态监控</span>
<span class="page-link">访问</span>
</a>
</div>
</div>

<!-- 工作流工具 -->
<div class="category-card">
<div class="category-header">
<span class="category-icon">⚙️</span>
<span class="category-title">工作流工具</span>
</div>
<div class="page-list">
<a href="http://localhost:3000/editor.html" target="_blank" class="page-item">
<span class="page-name">🎨 可视化编辑器</span>
<span class="page-link">访问</span>
</a>
<a href="http://localhost:3000/v3-workflow.html" target="_blank" class="page-item">
<span class="page-name">🚀 V3工作流</span>
<span class="page-link">访问</span>
</a>
<a href="http://localhost:3000/video-transcriber.html" target="_blank" class="page-item">
<span class="page-name">🎬 AI视频转录</span>
<span class="page-link">访问</span>
</a>
</div>
</div>

<!-- 系统配置 -->
<div class="category-card">
<div class="category-header">
<span class="category-icon">🔧</span>
<span class="category-title">系统配置</span>
</div>
<div class="page-list">
<a href="http://localhost:3000/config-center.html" target="_blank" class="page-item">
<span class="page-name">⚙️ 配置中心</span>
<span class="page-link">访问</span>
</a>
<a href="http://localhost:3000/accounts.html" target="_blank" class="page-item">
<span class="page-name">👥 账号管理</span>
<span class="page-link">访问</span>
</a>
<a href="http://localhost:3000/permissions.html" target="_blank" class="page-item">
<span class="page-name">🔐 权限管理</span>
<span class="page-link">访问</span>
</a>
</div>
</div>
</div>

<div class="status-bar">
<span class="status-dot"></span>
TK平台运行中 | 端口: 3000
</div>
</body>
</html>
