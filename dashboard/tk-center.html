<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TK运营中心</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f8fafc;min-height:100vh;color:#1e293b;padding:0}

/* Header - 简洁科技风 */
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:24px 40px;display:flex;justify-content:space-between;align-items:center}
.header-left{display:flex;align-items:center;gap:16px}
.back-link{display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(255,255,255,0.15);border-radius:12px;color:#fff;text-decoration:none;font-weight:500;transition:all .2s}
.back-link:hover{background:rgba(255,255,255,0.25)}
.header h1{color:#fff;font-size:28px;font-weight:700}
.header-actions{display:flex;gap:12px}
.main-btn{padding:14px 28px;background:#fff;color:#667eea;border-radius:12px;text-decoration:none;font-weight:600;display:flex;align-items:center;gap:8px;transition:all .2s}
.main-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(102,126,234,0.3)}

/* Main Content */
.container{max-width:1200px;margin:0 auto;padding:40px}

/* Section Title */
.section-title{font-size:20px;font-weight:600;color:#64748b;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.section-icon{font-size:24px}

/* Category Grid - 清新卡片 */
.category-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:24px;margin-bottom:40px}
.category-card{background:#fff;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,0.06);transition:all .3s;border:1px solid #e2e8f0}
.category-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(102,126,234,0.12);border-color:#667eea}
.category-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f1f5f9}
.category-icon{width:48px;height:48px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.category-title{font-size:18px;font-weight:600;color:#1e293b}

/* Page List */
.page-list{display:flex;flex-direction:column;gap:12px}
.page-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#f8fafc;border-radius:12px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.page-item:hover{background:#f1f5f9;border-color:#667eea}
.page-info{display:flex;align-items:center;gap:12px}
.page-icon{font-size:20px}
.page-name{font-size:15px;font-weight:500;color:#334155}
.page-desc{font-size:13px;color:#94a3b8;margin-top:4px}
.page-link{padding:8px 16px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;text-decoration:none;border-radius:8px;font-size:13px;font-weight:500;transition:all .2s}
.page-link:hover{transform:translateX(2px)}

/* Stats Bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:40px}
.stat-card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.04);text-align:center;border:1px solid #e2e8f0}
.stat-value{font-size:32px;font-weight:700;color:#667eea;margin-bottom:8px}
.stat-label{font-size:14px;color:#64748b;font-weight:500}

/* Status Footer */
.status-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:16px 40px;display:flex;justify-content:center;align-items:center;gap:24px;font-size:13px;color:#64748b}
.status-dot{width:10px;height:10px;border-radius:50%;background:#22c55e}
.status-item{display:flex;align-items:center;gap:8px}
</style>
</head>
<body>

<h1>🛒 TK运营中心</h1>
</div>
