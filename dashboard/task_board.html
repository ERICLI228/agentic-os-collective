<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic OS 指挥中心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f1117; color: #e4e6eb; height: 100vh; display: flex; flex-direction: column; }
.topbar { padding: 14px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 16px; }
.topbar h1 { font-size: 18px; }
.topbar .refresh { font-size: 11px; color: #666; margin-left: auto; }
.main { display: flex; flex: 1; overflow: hidden; }
.left { width: 340px; border-right: 1px solid #222; overflow-y: auto; padding: 10px; }
.right { flex: 1; overflow-y: auto; padding: 20px; }
.left h3 { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; padding: 8px; }
.ms-item { display: flex; align-items: center; padding: 10px 12px; border-radius: 8px; margin: 2px 0; cursor: pointer; transition: background .15s; }
.ms-item:hover { background: #1a1d27; }
.ms-item.active { background: #1e2a3a; border-left: 3px solid #3b82f6; }
.ms-item .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
.ms-item .dot.done { background: #22c55e; }
.ms-item .dot.waiting { background: #f59e0b; animation: pulse 1.5s infinite; }
.ms-item .dot.pending { background: #444; }
.ms-item .info { flex: 1; min-width: 0; }
.ms-item .name { font-size: 13px; }
.ms-item .sub { font-size: 11px; color: #666; }
.ms-item .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-left: 8px; flex-shrink: 0; }
.ms-item .badge.decision { background: #7c2d12; color: #fbbf24; }
.ms-item .badge.approved { background: #14532d; color: #22c55e; }
.ms-item .badge.rejected { background: #7f1d1d; color: #fca5a5; }
.right .empty { color: #555; text-align: center; padding: 80px 20px; font-size: 14px; }
.right .detail h2 { font-size: 20px; margin-bottom: 4px; }
.right .detail .status-line { font-size: 13px; color: #888; margin-bottom: 16px; }
.right .detail .section { background: #1a1d27; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.right .detail .section h3 { font-size: 13px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.progress-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
.progress-bar-wrap { flex: 1; height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }
.progress-pct { font-size: 12px; color: #888; min-width: 40px; text-align: right; }
.ai-box { border-left: 3px solid #3b82f6; padding-left: 12px; margin: 8px 0; }
.ai-box.recommend { border-color: #22c55e; }
.ai-box.warn { border-color: #f59e0b; }
.ai-box .rec { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.ai-box .rec .badge-rec { font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
.ai-box .rec .badge-app { background: #14532d; color: #22c55e; }
.ai-box .rec .badge-rej { background: #7f1d1d; color: #fca5a5; }
.ai-box .rec .badge-mod { background: #78350f; color: #fbbf24; }
.ai-box .reason { font-size: 12px; color: #aaa; line-height: 1.5; }
.risk-item { padding: 6px 0; font-size: 12px; display: flex; gap: 8px; align-items: flex-start; }
.risk-item .risk-icon { font-size: 14px; }
.risk-item .risk-detail { flex: 1; line-height: 1.4; }
.risk-item .risk-mitigation { color: #666; font-size: 11px; }
.step-list { font-size: 12px; }
.step-item { padding: 4px 0; display: flex; gap: 8px; align-items: center; }
.step-item .step-dot { width: 6px; height: 6px; border-radius: 50%; }
.step-item .step-dot.ok { background: #22c55e; }
.step-item .step-dot.ng { background: #ef4444; }
.step-item .step-dot.run { background: #3b82f6; animation: pulse 1.5s infinite; }
.forecast { font-size: 12px; color: #aaa; line-height: 1.6; }
.btn { display: inline-block; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; margin: 4px; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-warn { background: #d97706; color: #fff; }
.btn-danger { background: #dc2626; color: #fff; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: #000; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 100; }
.toast.show { opacity: 1; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div class="topbar">
  <h1>🚀 Agentic OS 指挥中心</h1>
  <span style="font-size:12px;color:#888;">Pipeline · v3.5.3</span>
  <span class="refresh" id="lastRefresh"></span>
</div>
<div class="main">
  <div class="left">
    <h3>Pipeline 里程碑</h3>
    <div id="milestoneList"></div>
  </div>
  <div class="right">
    <div class="empty" id="emptyState">👈 点击左侧里程碑查看详情</div>
    <div class="detail" id="detailView" style="display:none"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let state = { milestones: [], selected: null, data: {} };

async function refresh() {
  try {
    const resp = await fetch('/api/dashboard');
    state.data = await resp.json();
    state.milestones = state.data.milestones || [];
    renderList();
    document.getElementById('lastRefresh').textContent = new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('lastRefresh').textContent = '离线';
  }
}

function renderList() {
  const el = document.getElementById('milestoneList');
  el.innerHTML = state.milestones.map(m => {
    const cls = m.status === 'completed' ? 'done' : m.status === 'waiting_approval' ? 'waiting' : 'pending';
    const icon = m.status === 'completed' ? '✅' : m.status === 'waiting_approval' ? '⏸️' : '⏳';
    let badges = '';
    if (m.decision_point) {
      if (m.decision === 'approved') badges += '<span class="badge approved">已批准</span>';
      else if (m.decision === 'rejected') badges += '<span class="badge rejected">已驳回</span>';
      else if (m.status === 'waiting_approval') badges += '<span class="badge decision">待决策</span>';
      else badges += '<span class="badge decision">决策点</span>';
    }
    const active = state.selected === m.id ? ' active' : '';
    return `<div class="ms-item${active}" onclick="selectMs('${m.id}')">
      <span class="dot ${cls}"></span>
      <div class="info">
        <div class="name">${icon} ${m.id} ${m.name}</div>
        <div class="sub">${m.note || m.status}</div>
      </div>
      ${badges}
    </div>`;
  }).join('');
}

function selectMs(id) {
  state.selected = id;
  renderList();
  renderDetail(id);
}

function renderDetail(id) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';

  const ms = state.milestones.find(m => m.id === id);
  if (!ms) return;

  const isDecision = ms.decision_point && ms.status === 'waiting_approval';
  const isDone = ms.status === 'completed';
  const statusColor = isDone ? '#22c55e' : ms.status === 'waiting_approval' ? '#f59e0b' : '#666';
  const statusLabel = {completed:'已完成', waiting_approval:'等待你的决策', pending:'待执行',
    running:'执行中', approved:'已批准', rejected:'已驳回'}[ms.status] || ms.status;

  // 根据里程碑生成具体的分析内容
  const detail = getMsDetail(ms);
  const forecast = getForecast(ms);

  let html = `
    <div class="detail">
      <h2>${ms.id} ${ms.name}</h2>
      <div class="status-line" style="color:${statusColor}">● ${statusLabel} ${ms.note ? '· ' + ms.note : ''}</div>`;

  // AI分析 (决策点)
  if (isDecision) {
    const score = detail.ai_score || 0;
    const rec = detail.ai_recommendation || 'pending';
    const recLabel = {approved:'✅ 建议批准', rejected:'❌ 建议驳回', rework:'✏️ 建议修改'}[rec] || rec;
    const recBadge = {approved:'badge-app', rejected:'badge-rej', rework:'badge-mod'}[rec] || '';
    const boxCls = rec === 'approved' ? 'recommend' : 'warn';

    html += `<div class="section">
      <h3>🤖 AI 决策分析</h3>
      <div class="ai-box ${boxCls}">
        <div class="rec">${recLabel} <span class="badge-rec ${recBadge}">置信度 ${(detail.ai_confidence||0)*100|0}%</span></div>
        <div style="font-size:12px;color:#888;margin:4px 0;">综合评分 ${score}/10 · 风险等级: ${detail.risk_level||'medium'}</div>
        <div class="reason">${(detail.reasoning||[]).map(r => '• '+r).join('<br>')}</div>
      </div>`;

    if (detail.risks && detail.risks.length) {
      html += `<div style="margin-top:10px;font-size:12px;color:#f59e0b;">⚠️ 风险:</div>`;
      detail.risks.forEach(r => {
        const icon = {high:'🔴', medium:'🟡', low:'🟢'}[r.level] || '⚪';
        html += `<div class="risk-item"><span class="risk-icon">${icon}</span><div class="risk-detail">${r.name}: ${r.detail}${r.mitigation ? '<br><span class="risk-mitigation">缓解: '+r.mitigation+'</span>' : ''}</div></div>`;
      });
    }

    html += `</div>`;

    // 决策按钮
    html += `<div class="section">
      <h3>你的决策</h3>`;
    (detail.options||[]).forEach(opt => {
      const btnCls = opt.action === 'approved' ? 'btn-primary' : opt.action === 'rejected' ? 'btn-danger' : 'btn-warn';
      html += `<button class="btn ${btnCls}" onclick="submitDecision('${id}', '${opt.action}')">${opt.label}</button> `;
    });
    html += `</div>`;
  }

  // 执行进度
  if (detail.steps && detail.steps.length) {
    html += `<div class="section">
      <h3>📋 子任务执行进度</h3>
      <div class="progress-row">
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${detail.step_pct||0}%;background:${statusColor}"></div></div>
        <div class="progress-pct">${detail.step_pct||0}%</div>
      </div>
      <div class="step-list">`;
    detail.steps.forEach(s => {
      const sdot = s.status === 'ok' ? 'ok' : s.status === 'running' ? 'run' : 'ng';
      html += `<div class="step-item"><span class="step-dot ${sdot}"></span>${s.name} <span style="color:#666;font-size:11px;">${s.note||''}</span></div>`;
    });
    html += `</div></div>`;
  }

  // 关键数据
  if (detail.metrics) {
    html += `<div class="section">
      <h3>📊 关键数据</h3>`;
    Object.entries(detail.metrics).forEach(([k,v]) => {
      html += `<div style="font-size:12px;margin:4px 0;"><span style="color:#888;">${k}:</span> ${v}</div>`;
    });
    html += `</div>`;
  }

  // 下一步预报
  html += `<div class="section">
    <h3>🔮 下一步预报</h3>
    <div class="forecast">${forecast}</div>
  </div>`;

  html += `</div>`;
  document.getElementById('detailView').innerHTML = html;
}

  const map = {

      metrics: {'综合评分': '7.56/10', '毛利率': '51%', '竞品数': 12, '达人可用': '50+'},
      steps: [
        {name: '竞品饱和度分析', status: 'ok', note: '头部3家，中部9家'},
        {name: '利润空间核算', status: 'ok', note: '毛利51%'},

    },
    'MS-2': {

      metrics: {'TOP1': '蓝牙耳机 Pro (8.42)', 'TOP2': '无线充电器 (8.30)', 'TOP3': '手机支架 (8.24)'},
      steps: [

    },

      metrics: {'检查项': '危险品/禁售/敏感词', '结果': '通过'},
      steps: [

      ], step_pct: 100,

      steps: [

        {name: '等待MS-4审批', status: 'running'},
      ], step_pct: 67,
    },

      ai_score: 8.0, ai_recommendation: 'approved', ai_confidence: 0.80,
      reasoning: ['全部前序步骤已完成或可接受', '3个商品通过合规检查', '目标市场菲律宾需求确认', '发布风险可控'],
      risk_level: 'low',
      risks: [
        {name: '首单0销量', level: 'low', detail: '新品无历史数据，需7天观察期', mitigation: '同步启动广告推广+达人合作'},
      ],
      options: [
        {action:'approved',label:'✅ 批准发布'},
        {action:'modify',label:'✏️ 修改后再审'},

      ],
      metrics: {'待发布商品': 3, '店铺': '菲律宾(8371977)', '门禁状态': '等待你的决策'},
      steps: [

        {name: 'publish_gate.py', status: 'running', note: '等待MIAOSHOW_PUBLISH_ENABLED'},
        {name: '你的决策', status: 'running', note: '待点击批准'},

      ], step_pct: 50,
    },
    'MS-5': {
      metrics: {'推送状态': '已飞书', '昨日订单': '0(未发品)', '店铺健康': '6店正常'},
      steps: [
        {name: '数据聚合', status: 'ok'},

      ], step_pct: 100,
    },
  };

  return map[ms.id] || {
    metrics: {'状态': ms.status},
    steps: [{name: '执行中', status: 'running'}],
    step_pct: 50,
  };
}

function getForecast(ms) {
  const nextMap = {
    'MS-1': '→ MS-1.5: AI自动进行市场判断(竞品饱和度/利润空间/供应链/季节性/达人潜力)，完成后需要你的决策',
    'MS-1.5': '→ 等你批准后进入 MS-2: AI自动选品分析(五维评分+TOP3推荐)',
    'MS-2': '→ 等你批准选品后进入 MS-2.1~2.6: 内容本地化/类目映射/图像适配/定价/物流/合规',
    'MS-2.1': '→ MS-2.2: 类目映射自动匹配',
    'MS-2.2': '→ MS-2.3: 图像适配(去背景+尺寸优化)',
    'MS-2.3': '→ MS-2.4: 5国定价策略计算',
    'MS-2.4': '→ MS-2.5: 物流模板配置',
    'MS-2.5': '→ MS-2.6: 合规检查',
    'MS-2.6': '→ MS-3: 发布准备',
    'MS-3': '→ MS-4: 发布审批 — 最后一道关卡，需要你的决策。确保 MIAOSHOW_PUBLISH_ENABLED=true',
    'MS-4': '→ 批准后自动发布3品到菲律宾站(8371977) → MS-5生成日报推送飞书。预计5分钟内完成。',
    'MS-5': '→ 每日自动推送。下一步: 监控订单/广告/达人数据，进入运营阶段。',
    'MS-0': '→ MS-1: 采集箱数据自动同步。门禁通过即可自动进入。',
  };
  return nextMap[ms.id] || '→ 下一步: 系统自动推进到下一里程碑';
}

async function submitDecision(msId, action) {
  const resp = await fetch('/api/decision', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({task_id: 'TK-20260429-PIPELINE', action, reason: '驾驶舱决策', milestone_id: msId})
  });
  const data = await resp.json();
  const t = document.getElementById('toast');
  t.textContent = action === 'approved' ? '✅ 已批准' : action === 'rejected' ? '❌ 已驳回' : '✏️ 已标记';
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); refresh(); selectMs(msId); }, 600);
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
