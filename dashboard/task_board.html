<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic OS 指挥中心 v3.6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0f1117;color:#e4e6eb;height:100vh;display:flex;flex-direction:column}
.topbar{padding:8px 16px;border-bottom:1px solid #222;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar h1{font-size:15px}
.tabs{display:flex;gap:4px}
.tab{padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;border:1px solid #333;color:#888;background:transparent}
.tab:hover{color:#e4e6eb}
.tab.active{background:#2563eb;border-color:#2563eb;color:#fff}
.main{display:flex;flex:1;overflow:hidden}
.left{width:340px;border-right:1px solid #222;overflow-y:auto;padding:4px 0}
.right{flex:1;overflow-y:auto;padding:12px 16px}

.task-hdr{display:flex;align-items:center;padding:6px 10px;font-size:10px;color:#555;letter-spacing:0.5px;gap:5px;border-bottom:1px solid #111;margin-top:2px}
.task-hdr .tn{flex:1;font-weight:600;color:#999;font-size:11px}
.task-hdr .tp{font-size:9px;color:#444}
.task-hdr .td{width:6px;height:6px;border-radius:50%}.td.g{background:#22c55e}.td.y{background:#f59e0b}.td.n{background:#444}

.ms-item{display:flex;align-items:center;padding:5px 8px 5px 16px;border-radius:3px;cursor:pointer;font-size:12px;gap:6px}
.ms-item:hover{background:#1a1d27}
.ms-item.sel{background:#1e2a3a;border-left:3px solid #3b82f6;padding-left:13px}
.ms-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.d{background:#22c55e}.dot.w{background:#f59e0b;animation:pulse 1.5s infinite}.dot.p{background:#444}
.ms-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bdg{font-size:9px;padding:0 4px;border-radius:6px;flex-shrink:0}
.bdg.mk{background:#3d2e0a;color:#fbbf24}.bdg.cp{background:#1a2756;color:#93c5fd}
.bdg.dc{background:#7c2d12;color:#fbbf24}.bdg.ok{background:#14532d;color:#22c55e}

.stats{display:flex;gap:6px;padding:4px 10px}
.stat{flex:1;background:#111;border-radius:6px;padding:6px;text-align:center}
.stat .num{font-size:16px;font-weight:700}
.stat .lbl{font-size:8px;color:#555}

.detail h2{font-size:16px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.detail .meta{font-size:11px;color:#888;margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap}
.sec{background:#1a1d27;border-radius:6px;padding:12px;margin-bottom:10px}
.sec h3{font-size:11px;color:#888;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ent-row{display:flex;padding:4px 0;font-size:11px;gap:8px;border-bottom:1px solid #111;align-items:flex-start}
.ent-row:last-child{border-bottom:none}
.ent-lbl{min-width:70px;color:#888;flex-shrink:0}
.ent-val{flex:1;min-width:0}
.ent-val .before{font-size:9px;color:#555;margin-top:1px}
.ent-val .after{font-size:9px;color:#aaa;margin-top:1px}
.ent-val .note{font-size:9px;color:#666;margin-top:1px}
.src-tag{font-size:8px;padding:0 4px;border-radius:2px;margin-left:4px}
.src-real{background:#0f3b2e;color:#34d399}.src-mock{background:#3d2e0a;color:#fbbf24}.src-computed{background:#1a2756;color:#93c5fd}

.ai-box{border-left:3px solid #3b82f6;padding:4px 10px;margin:6px 0;font-size:11px}
.progress-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.pbar{flex:1;height:4px;background:#222;border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px}
.btn{display:inline-block;padding:5px 12px;border-radius:5px;border:none;cursor:pointer;font-size:11px;margin:2px}
.btn-p{background:#2563eb;color:#fff}.btn-w{background:#d97706;color:#fff}.btn-d{background:#dc2626;color:#fff}
.btn-s{background:#22c55e;color:#000}
.toast{position:fixed;bottom:16px;right:16px;background:#22c55e;color:#000;padding:6px 14px;border-radius:6px;font-size:11px;opacity:0;transition:opacity .3s;z-index:100}
.toast.on{opacity:1}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ic{font-size:11px;margin-right:2px}.ic.ok{color:#22c55e}.ic.ng{color:#ef4444}.ic.wn{color:#f59e0b}
.empty-state{color:#555;text-align:center;padding:40px 20px;font-size:13px}

/* v3.6: Image gallery */
.img-gallery{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.img-card{background:#111;border-radius:6px;padding:4px;text-align:center;font-size:9px;color:#888;max-width:180px;cursor:pointer;transition:transform .15s}
.img-card:hover{transform:scale(1.03);box-shadow:0 0 8px rgba(59,130,246,.3)}
.img-card img{max-width:170px;max-height:300px;border-radius:4px;display:block}
.img-card .img-label{margin-top:3px;display:block}
.img-actions{margin-top:4px;display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.mini-btn{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid #333;cursor:pointer;color:#aaa;background:#1a1a2e}
.mini-btn:hover{background:#2563eb;color:#fff;border-color:#2563eb}
.mini-btn.busy{opacity:.5;pointer-events:none}

/* v3.6: Modal */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:200;justify-content:center;align-items:center;cursor:pointer}
.modal.on{display:flex}
.modal img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:4px}
.modal-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;line-height:1;z-index:201}

/* v3.6: Inline edit */
.inline-edit{display:none;margin-top:6px}
.inline-edit.show{display:flex;flex-direction:column;gap:4px}
.inline-edit textarea,.inline-edit input{width:100%;background:#111;border:1px solid #333;color:#e4e6eb;padding:4px 6px;border-radius:4px;font-size:10px;margin:2px 0;min-height:50px}
.inline-edit select{background:#111;border:1px solid #333;color:#e4e6eb;padding:3px;border-radius:4px;font-size:10px}
.inline-edit .edit-btns{display:flex;gap:4px}

/* v3.6: Storyboard card */
.sb-card{background:#1a1d27;border-left:3px solid #3b82f6;border-radius:4px;padding:10px;margin:6px 0;position:relative}
.sb-card .sb-seq{position:absolute;top:8px;left:8px;background:#3b82f6;color:#fff;width:20px;height:20px;border-radius:50%;text-align:center;line-height:20px;font-size:10px;font-weight:700}
.sb-card .sb-body{margin-left:28px}
.sb-card .sb-act{color:#93c5fd;font-size:10px;font-weight:600;margin-bottom:2px}
.sb-card .sb-name{color:#e4e6eb;font-size:11px;font-weight:600;margin-bottom:2px}
.sb-card .sb-desc{color:#888;font-size:10px;margin:4px 0}
.sb-card .sb-emotion{color:#fbbf24;font-size:10px;margin:2px 0}
.sb-card .sb-dialogue{color:#aaa;font-size:10px;margin:4px 0;font-style:italic}

/* v3.6: Subtle edit link */
.sb-edit{font-size:9px;color:#555;cursor:pointer;text-decoration:none;margin-left:4px;user-select:none}
.sb-edit:hover{color:#3b82f6}

/* v3.6: Episode row */
.ep-row{display:flex;align-items:center;padding:8px 10px;background:#14161d;border-radius:4px;margin:4px 0;cursor:pointer;gap:8px;transition:background .15s}
.ep-row:hover{background:#1e2130}
.ep-row .ep-num{color:#3b82f6;font-size:11px;font-weight:700;min-width:48px}
.ep-row .ep-title{flex:1;font-size:11px;color:#e4e6eb}
.ep-row .ep-toggle{font-size:10px;color:#555;transition:transform .2s}
.ep-row.open .ep-toggle{transform:rotate(90deg)}
.ep-row .ep-actions{display:flex;gap:4px}

/* v3.6: Character row */
.char-row{background:#1a1d27;border-radius:6px;padding:10px;margin:6px 0}
.char-row .char-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.char-row .char-name{font-size:12px;font-weight:700;color:#e4e6eb}
.char-row .char-role{font-size:10px;color:#888}
.char-row .char-gallery{margin:6px 0}
.char-row .char-actions{display:flex;gap:4px;flex-wrap:wrap}

/* v3.6: Product row */
.prod-row{background:#1a1d27;border-radius:6px;padding:10px;margin:6px 0}
.prod-row .prod-name{font-size:11px;font-weight:600;color:#e4e6eb;margin-bottom:6px}

/* v3.6: Loading */
.loading{color:#f59e0b;font-size:10px;animation:pulse 1.5s infinite}
.status-busy{color:#f59e0b;font-size:10px;margin-left:6px}
</style>
</head>
<body>
<div class="topbar">
  <h1>Agentic OS 指挥中心 v3.6</h1>
  <div class="tabs">
    <button class="tab active" id="tabTK" onclick="switchTab('tk')">TK运营 <span id="tkCount" style="font-size:9px;color:#666"></span></button>
    <button class="tab" id="tabDM" onclick="switchTab('drama')">数字短剧 <span id="dmCount" style="font-size:9px;color:#666"></span></button>
  </div>
  <span style="font-size:10px;color:#444;margin-left:auto" id="lastRefresh"></span>
</div>
<div class="main">
  <div class="left">
    <div class="stats">
      <div class="stat"><div class="num" id="statDone" style="color:#22c55e">-</div><div class="lbl">已完成</div></div>
      <div class="stat"><div class="num" id="statPending" style="color:#f59e0b">-</div><div class="lbl">待决策</div></div>
      <div class="stat"><div class="num" id="statMock" style="color:#fbbf24">-</div><div class="lbl">模拟</div></div>
      <div class="stat"><div class="num" id="statTotal" style="color:#666">-</div><div class="lbl">总计</div></div>
    </div>
    <div id="list"></div>
  </div>
  <div class="right">
    <div class="empty-state" id="empty"><div id="summaryView"></div></div>
    <div class="detail" id="detail" style="display:none"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="modal" onclick="this.classList.remove('on')">
  <span class="modal-close">&times;</span>
  <img id="modalImg" src="" alt="zoom" />
</div>

<script>
// ================================================================
// CONSTANTS
// ================================================================
const CHAR_MAP={'武松':'wusong','鲁智深':'luzhishen','林冲':'linchong','宋江':'songjiang','李逵':'likui','吴用':'wuyong'};
const VOICE_OPTS=['zhiming(浑厚有力)','zhiming(粗犷豪迈)','zhiming(稳重威严)','zhilun(沉郁悲壮)','zhilun(沉稳内敛)','zhiqiang(深沉自尊)','zhiqi(年轻活力)'];
const CHAR_NAMES=['武松','鲁智深','林冲','宋江','李逵','吴用'];
const CHAR_ROLES={武松:'行者・打虎英雄',鲁智深:'花和尚・倒拔垂杨柳',林冲:'豹子头・八十万禁军教头',宋江:'及时雨・呼保义',李逵:'黑旋风・沂岭杀四虎',吴用:'智多星・智取生辰纲'};

let cur='tk',sel=null,all=[],lastData=null;

// ================================================================
// EXISTING: refresh
// ================================================================
async function refresh(){
  try{
    const r=await fetch('/api/dashboard'); lastData=await r.json();
    all=(lastData?.milestones||[]).map(m=>({...m,pipeline:m.pipeline||(String(m.ms_id||'').startsWith('DM')?'drama':'tk')}));
    render();
    document.getElementById('lastRefresh').textContent=new Date().toLocaleTimeString();
  }catch(e){document.getElementById('lastRefresh').textContent='离线'}
}

// ================================================================
// EXISTING: switchTab
// ================================================================
function switchTab(t){
  cur=t; sel=null;
  document.getElementById('tabTK').className='tab'+(t=='tk'?' active':'');
  document.getElementById('tabDM').className='tab'+(t=='drama'?' active':'');
  render();
}

// ================================================================
// EXISTING: render
// ================================================================
function render(){
  const f=all.filter(m=>m.pipeline===cur);
  document.getElementById('tkCount').textContent=all.filter(m=>m.pipeline=='tk').length;
  document.getElementById('dmCount').textContent=all.filter(m=>m.pipeline=='drama').length;

  const done=f.filter(m=>m.status=='completed'||m.status=='approved').length;
  const pnd=f.filter(m=>m.status=='waiting_approval').length;
  const mck=f.filter(m=>m.data_source=='mock').length;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statPending').textContent=pnd;
  document.getElementById('statMock').textContent=mck;
  document.getElementById('statTotal').textContent=f.length;

  const g={};
  f.forEach(m=>{const tid=m.task_id||'_';if(!g[tid])g[tid]=[];g[tid].push(m)});
  const tl={'TK-MS0-GATE':'MS-0 采集门禁','TK-SELECTION':'选品与市场判断','TK-LOCALIZE':'本地化与上架准备',
    'TK-PUBLISH':'发布与日报','TK-DM-PREP':'前期策划','TK-DM-PROD':'制片制作','TK-DM-DIST':'发布分发','_':'未分组'};

  let h='';
  for(const [tid,ml] of Object.entries(g)){
    const dt=ml.filter(m=>m.status=='completed'||m.status=='approved').length;
    const cls=dt===ml.length?'g':dt>0?'y':'n';
    h+=`<div class="task-hdr"><span class="td ${cls}"></span><span class="tn">${tl[tid]||tid}</span><span class="tp">${dt}/${ml.length}</span></div>`;
    ml.forEach(m=>{
      const dc=m.status=='completed'||m.status=='approved'?'d':m.status=='waiting_approval'?'w':'p';
      const ic=m.status=='completed'||m.status=='approved'?'&#10003;':m.status=='waiting_approval'?'&#9699;':'&#9711;';
      let b='';
      if(m.data_source!=='real')b+=`<span class="bdg ${m.data_source=='mock'?'mk':'cp'}">${m.data_source=='mock'?'模拟':'推算'}</span>`;
      if(m.decision_point&&m.status=='waiting_approval')b+='<span class="bdg dc">待决策</span>';
      if(m.decision_point&&m.decision=='approved')b+='<span class="bdg ok">已批准</span>';
      h+=`<div class="ms-item${sel===m.ms_id?' sel':''}" onclick="select('${m.ms_id}')">
        <span class="dot ${dc}"></span><span class="nm">${ic} ${m.ms_id} ${m.name}</span>${b}</div>`;
    });
  }
  document.getElementById('list').innerHTML=h;

  if(sel)renderDetail();
  else{document.getElementById('empty').style.display='block';document.getElementById('detail').style.display='none';renderSummary()}
}

// ================================================================
// EXISTING: select
// ================================================================
function select(id){sel=id;render()}

// ================================================================
// EXISTING: renderSummary
// ================================================================
function renderSummary(){
  const f=all.filter(m=>m.pipeline===cur);
  const w=f.filter(m=>m.status=='waiting_approval');
  let h='<div style="max-width:700px;margin:0 auto;"><h3 style="color:#888;margin-bottom:12px;font-size:13px;">决策面板</h3>';
  if(!w.length){h+='<div style="color:#444;padding:20px;text-align:center;background:#1a1d27;border-radius:6px;">无待决策项</div>'}
  else w.forEach(m=>{
    h+=`<div style="background:#1a1d27;border-radius:6px;padding:12px;margin:8px 0;font-size:12px;">
      <b>${m.ms_id} ${m.name}</b><div style="color:#888;font-size:10px;">${m.note||''}</div>
      <div style="margin-top:6px">`;
    [{a:'approved',l:'批准',c:'btn-p'},{a:'modify',l:'修改',c:'btn-w'},{a:'rejected',l:'驳回',c:'btn-d'}].forEach(o=>{
      h+=`<button class="btn ${o.c}" onclick="event.stopPropagation();decide('${m.ms_id}','${o.a}')">${o.l}</button> `;
    });
    h+='</div></div>';
  });
  const d=f.filter(m=>m.status=='completed'||m.status=='approved').length;
  const p=f.length?Math.round(d/f.length*100):0;
  h+=`<h3 style="color:#888;margin:14px 0 8px;font-size:12px;">${cur=='tk'?'TK运营':'数字短剧'} 总览</h3>
    <div style="background:#1a1d27;border-radius:6px;padding:12px;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="pbar"><div class="pfill" style="width:${p}%;background:#22c55e"></div></div>
        <span style="font-weight:700;color:#22c55e;font-size:13px;">${d}/${f.length}</span>
      </div>
      <div style="font-size:9px;color:#555;margin-top:6px;">&#10003; ${f.filter(m=>m.status=='completed'||m.status=='approved').map(m=>m.name).join(' · ')||'无'}</div>
    </div>`;
  h+='</div>';
  document.getElementById('summaryView').innerHTML=h;
}

// ================================================================
// EXISTING: decide
// ================================================================
async function decide(msId,action){
  await fetch('/api/decision',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({task_id:'TK-20260429-PIPELINE',action,reason:'驾驶舱决策',milestone_id:msId})});
  toastMsg({approved:'已批准',rejected:'已驳回',modify:'已标记'}[action]||action);
}

// ================================================================
// EXISTING: toastMsg
// ================================================================
function toastMsg(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('on');
  setTimeout(()=>{t.classList.remove('on');refresh()},800);
}

// ================================================================
// v3.6: Utility Functions
// ================================================================
function extractImages(note) {
  if(!note) return [];
  const imgs = [];
  const m1 = note.match(/image:\s*(\/api\/images\/file\/[^\s|]+)/g);
  if(m1) m1.forEach(m=>{ imgs.push({url:m.replace('image: ','').trim(), type:'product'}); });
  const m2 = note.match(/渲染:\s*(\/api\/render\/[^\s|]+)/g);
  if(m2) m2.forEach(m=>{ imgs.push({url:m.replace('渲染: ','').trim(), type:'render'}); });
  return imgs;
}

function extractCharRenderUrls(note) {
  if(!note) return null;
  const m = note.match(/\/api\/render\/(\w+)/);
  return m ? m[1] : null;
}

function checkImage(url){
  return new Promise(r=>{
    const img = new Image();
    img.onload = ()=>r(true);
    img.onerror = ()=>r(false);
    img.src = url;
    setTimeout(()=>r(false), 3000);
  });
}

// ================================================================
// v3.6: zoomImg - open modal with full-size image
// ================================================================
function zoomImg(url){
  document.getElementById('modalImg').src=url;
  document.getElementById('modal').classList.add('on');
}

// ================================================================
// v3.6: renderDefault - existing entity item rendering logic
// ================================================================
function renderDefault(detail){
  let h='';
  if(detail.sections){
    detail.sections.forEach(s=>{
      const st=s.source||'mock';
      h+=`<div class="sec"><h3>${s.title} <span class="src-tag src-${st}">[${st}]</span></h3>`;
      if(s.summary)h+=`<div style="font-size:10px;color:#666;margin-bottom:6px;">${s.summary}</div>`;
      if(s.items)s.items.forEach(it=>{
        const ic2={'ok':'<span class="ic ok">&#10003;</span>','ng':'<span class="ic ng">&#10007;</span>','warn':'<span class="ic wn">&#9888;</span>'};
        h+=`<div class="ent-row">${ic2[it.status]||' '}<span class="ent-lbl">${it.label}</span><div class="ent-val"><span>${it.value}</span>`;
        if(it.before)h+=`<div class="before">&larr; ${it.before}</div>`;
        if(it.after)h+=`<div class="after">&rarr; ${it.after}</div>`;
        if(it.note)h+=`<div class="note">&#9432; ${it.note}</div>`;
        const imgs = extractImages(it.note||'');
        if(imgs.length > 0){
          h+=`<div class="img-gallery">`;
          imgs.forEach(img=>{
            h+=`<div class="img-card" onclick="event.stopPropagation();zoomImg('${img.url}')">
              <img src="${img.url}" loading="lazy" onerror="this.style.display='none'" />
              <span class="img-label">${img.type}</span>
            </div>`;
          });
          h+=`</div>`;
        }
        h+=`</div></div>`;
      });
      h+=`</div>`;
    });
  }
  return h;
}

// ================================================================
// v3.6: SMART ROUTING renderDetail
// ================================================================
async function renderDetail(){
  document.getElementById('empty').style.display='none';
  document.getElementById('detail').style.display='block';
  const ms=all.find(m=>m.ms_id===sel);
  if(!ms)return;

  const done=ms.status=='completed'||ms.status=='approved';
  const sl={completed:'已完成',waiting_approval:'等待决策',pending:'待执行',running:'执行中',approved:'已批准',rejected:'已驳回'};
  const sc=done?'#22c55e':ms.status=='waiting_approval'?'#f59e0b':'#666';
  const tag=ms.data_source!=='real'?`<span class="src-tag src-${ms.data_source}">${ms.data_source=='mock'?'[模拟]':'[推算]'}</span>`:'';

  let h=`<h2>${ms.ms_id} ${ms.name} ${tag}</h2>
    <div class="meta"><span style="color:${sc}">&bullet; ${sl[ms.status]||ms.status}</span><span>${ms.note||''}</span>`;
  if(ms.task_id)h+=`<span style="color:#556">任务: ${ms.task_id}</span>`;
  h+=`</div>`;

  let detail=null;
  try{
    const r=await fetch('/api/detail/'+ms.ms_id);
    detail=await r.json();
    h+=renderDefault(detail);
  }catch(e){h+=`<div class="sec"><h3>详情</h3><div style="color:#555;font-size:11px;">加载失败: ${e.message}</div></div>`}

  // Decision actions
  if(ms.decision_point&&ms.status=='waiting_approval'){
    h+=`<div class="sec"><h3>你的决策</h3>`;
    [{a:'approved',l:'批准发布',c:'btn-p'},{a:'modify',l:'修改',c:'btn-w'},{a:'rejected',l:'驳回',c:'btn-d'}].forEach(o=>{
      h+=`<button class="btn ${o.c}" onclick="decide('${ms.ms_id}','${o.a}')">${o.l}</button> `;
    });
    h+=`</div>`;
  }

  document.getElementById('detail').innerHTML=h;

  // SMART ROUTING
  if(ms.ms_id==='DM-0'){
    await renderDM0(detail,ms);
  }else if(ms.ms_id==='DM-1'){
    await renderDM1(detail,ms);
  }else if(ms.ms_id==='MS-2.3'){
    await renderMS23(detail,ms);
  }else if(ms.ms_id&&/^DM-(6|7|8|9|10)$/.test(ms.ms_id)){
    await renderDMEpisode(ms.ms_id,detail,ms);
  }
}

// ================================================================

// ================================================================
// v3.6: toggleSB - expand/collapse storyboard for an episode
// ================================================================
async function toggleSB(epNum){
  const scenesEl=document.getElementById('sb-'+epNum);
  const rowEl=document.getElementById('eprow-'+epNum);
  if(!scenesEl||!rowEl)return;

  if(scenesEl.style.display==='none'){
    scenesEl.style.display='block';
    rowEl.classList.add('open');
    if(scenesEl.querySelector('.loading')){
      await loadStoryboard(epNum);
    }
  }else{
    scenesEl.style.display='none';
    rowEl.classList.remove('open');
  }
}

async function loadStoryboard(epNum){
  const scenesEl=document.getElementById('sb-'+epNum);
  if(!scenesEl)return;
  try{
    const r=await fetch('/api/script/'+parseInt(epNum));
    const data=await r.json();
    const scenes=data.scenes||data.storyboard||[];
    if(!scenes.length){scenesEl.innerHTML='<span style="font-size:10px;color:#555;">无分镜数据</span>';return;}
    let sbH='';
    scenes.forEach(sc=>{
      const seq=sc.seq||sc.sequence||sc.num||'';
      const act=sc.act||'';
      const name=sc.name||sc.scene||'';
      const desc=sc.description||sc.desc||'';
      const emotion=sc.emotion||'';
      const dialogue=sc.dialogue||'';
      const imgs=sc.images||sc.renders||[];
      sbH+=`<div class="sb-card">
        <div class="sb-seq">${seq}</div>
        <div class="sb-body">
          ${act?`<div class="sb-act">${act}</div>`:''}
          ${name?`<div class="sb-name">${name}</div>`:''}
          ${desc?`<div class="sb-desc">${desc}</div>`:''}
          ${emotion?`<div class="sb-emotion">情感: ${emotion}</div>`:''}
          ${dialogue?`<div class="sb-dialogue">对白: ${dialogue}</div>`:''}
          <a class="sb-edit" href="javascript:void(0)" onclick="editSB('${epNum}','${seq}')">&#9998; 编辑</a>
          <div class="inline-edit" id="edit-${epNum}-${seq}">
            <textarea id="desc-${epNum}-${seq}">${desc.replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
            <div class="edit-btns">
              <button class="mini-btn" onclick="saveSBEdit('${epNum}','${seq}')">保存</button>
              <button class="mini-btn" onclick="cancelSBEdit('${epNum}','${seq}')">取消</button>
            </div>
          </div>`;
      if(imgs.length>0){
        sbH+=`<div class="img-gallery">`;
        imgs.forEach(img=>{
          const url=typeof img==='string'?img:(img.url||img.src||'');
          if(url)sbH+=`<div class="img-card" onclick="event.stopPropagation();zoomImg('${url}')"><img src="${url}" loading="lazy" onerror="this.style.display='none'"/><span class="img-label">渲染</span></div>`;
        });
        sbH+=`</div>`;
      }
      sbH+=`</div></div>`;
    });
    scenesEl.innerHTML=sbH;
  }catch(e){
    scenesEl.innerHTML=`<span style="font-size:10px;color:#ef4444;">加载失败: ${e.message}</span>`;
  }
}

// ================================================================
// v3.6: Storyboard editing
// ================================================================
function editSB(epNum,seq){
  const el=document.getElementById('edit-'+epNum+'-'+seq);
  if(!el)return;
  el.classList.add('show');
}

async function saveSBEdit(epNum,seq){
  const descEl=document.getElementById('desc-'+epNum+'-'+seq);
  const editEl=document.getElementById('edit-'+epNum+'-'+seq);
  if(!descEl||!editEl)return;
  const newDesc=descEl.value;
  try{
    const r=await fetch('/api/script/'+parseInt(epNum),{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({seq:parseInt(seq),description:newDesc})
    });
    if(r.ok){
      toastMsg('分镜已更新: 第'+epNum+'集 #'+seq);
      editEl.classList.remove('show');
      const sbCard=editEl.closest('.sb-card');
      if(sbCard){
        const descDiv=sbCard.querySelector('.sb-desc');
        if(descDiv)descDiv.textContent=newDesc;
      }
    }else{toastMsg('保存失败')}
  }catch(e){toastMsg('保存失败: '+e.message)}
}

function cancelSBEdit(epNum,seq){
  const el=document.getElementById('edit-'+epNum+'-'+seq);
  if(el)el.classList.remove('show');
}

// ================================================================
// v3.6: downloadScript
// ================================================================
function downloadScript(epNum,fmt){
  const ep=parseInt(epNum);
  const url='/api/download?name=ep'+String(ep).padStart(2,'0')+'.'+fmt;
  window.open(url,'_blank');
}

// ================================================================
// v3.6: renderDM1 - DM-1: 6角色视觉设计
// ================================================================
function renderDM1(detail,ms){
  const detailEl=document.getElementById('detail');
  let sec=`<div class="sec" id="dm1-sec"><h3>&#127917; 6角色视觉设计</h3>`;

      </div>

      </div>
      <div class="char-actions">
        <button class="mini-btn" onclick="toggleCharEdit('${fid}')">&#9998; 编辑属性</button>

      </div>
      <div class="inline-edit" id="charedit-${fid}">
        <div style="font-size:10px;color:#888;margin:4px 0">音色:

    VOICE_OPTS.forEach(v=>{chH+=`<option value="${v}">${v}</option>`;});

        <div style="font-size:10px;color:#888;margin:4px 0">配色:

        </div>

  });

// ================================================================
// v3.6: loadCharGal - async load character render gallery
// ================================================================
async function loadCharGal(charName){
  const galleryEl=document.getElementById('chargal-'+charName);
  const statusEl=document.getElementById('chargal-status-'+charName);
  if(!galleryEl)return;
  try{
    const r=await fetch('/api/character/'+charName);
    const data=await r.json();
    const renders=data.renders||data.designs||data.images||[];
    if(renders.length>0){
      let imgs='';
      renders.forEach(rd=>{
        const url=typeof rd==='string'?rd:(rd.url||rd.src||'');
        const label=rd.label||rd.name||'';
        if(url)imgs+=`<div class="img-card" onclick="event.stopPropagation();zoomImg('${url}')"><img src="${url}" loading="lazy" onerror="this.style.display='none'"/><span class="img-label">${label}</span></div>`;
      });
      galleryEl.innerHTML=imgs?`<div class="img-gallery">${imgs}</div>`:'<span style="font-size:10px;color:#555;">无渲染图</span>';
    }else{
      let found=0,imgs='';
      for(let i=1;i<=3;i++){
        const shot=String(i).padStart(2,'0');
        const url=`/api/render/${charName}/shot_${shot}.png`;
        const ok=await checkImage(url);
        if(ok){imgs+=`<div class="img-card" onclick="event.stopPropagation();zoomImg('${url}')"><img src="${url}" loading="lazy" onerror="this.parentElement.remove()"/><span class="img-label">镜${shot}</span></div>`;found++;}
      }
      galleryEl.innerHTML=found>0?`<div class="img-gallery">${imgs}</div>`:'<span style="font-size:10px;color:#555;">无渲染图 &middot; 点击"重新生成"</span>';
    }
    if(statusEl)statusEl.remove();
  }catch(e){
    galleryEl.innerHTML='<span style="font-size:10px;color:#555;">加载失败</span>';
    if(statusEl)statusEl.remove();
  }
}

// ================================================================
// v3.6: toggleCharEdit - show/hide character edit form
// ================================================================
function toggleCharEdit(charName){
  const el=document.getElementById('charedit-'+charName);
  if(!el)return;
  const visible=el.classList.contains('show');
  if(visible){el.classList.remove('show');return;}
  fetch('/api/character/'+charName).then(r=>r.json()).then(d=>{
    const design=d.design||{};
    const voiceEl=document.getElementById('voice-'+charName);
    const colorEl=document.getElementById('color-'+charName);
    if(design.voice&&voiceEl)voiceEl.value=design.voice;
    if(design.color&&colorEl)colorEl.value=design.color;
  }).catch(()=>{});
  el.classList.add('show');
}

// ================================================================
// v3.6: saveChar - save character edits
// ================================================================
async function saveChar(charName){
  const voiceEl=document.getElementById('voice-'+charName);
  const colorEl=document.getElementById('color-'+charName);
  const data={};
  if(voiceEl)data.voice=voiceEl.value;
  if(colorEl)data.color=colorEl.value;
  try{
    const r=await fetch('/api/character/'+charName,{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(r.ok){
      toastMsg('角色已更新: '+charName);
      document.getElementById('charedit-'+charName).classList.remove('show');
      loadCharGal(charName);
    }else toastMsg('更新失败');
  }catch(e){toastMsg('更新失败: '+e.message)}
}

// ================================================================
// v3.6: reRender - show re-render command toast
// ================================================================
function reRender(charName){
  const btn=document.getElementById('rerender-btn-'+charName);
  if(btn){btn.classList.add('busy');btn.textContent='排队中...';setTimeout(()=>{btn.classList.remove('busy');btn.textContent='\u{1F3AC} 重新生成';},2000);}
  toastMsg('渲染命令: python3 shared/comfyui_renderer.py --character '+charName);
}

// ================================================================
// v3.6: renderMS23 - MS-2.3: 产品图片
// ================================================================
async function renderMS23(detail,ms){
  const detailEl=document.getElementById('detail');
  let sec=`<div class="sec" id="ms23-sec"><h3>&#128230; 产品图片</h3>`;
  sec+=`<div id="ms23-products"><span class="loading">加载产品图片...</span></div>`;
  sec+=`</div>`;
  detailEl.insertAdjacentHTML('beforeend',sec);

  try{
    const r=await fetch('/api/images');
    const products=await r.json();
    const prodList=Array.isArray(products)?products:(products.images||products.products||[]);
    if(!prodList.length){document.getElementById('ms23-products').innerHTML='<span style="font-size:10px;color:#555;">无产品数据</span>';return;}

    let pH='';
    prodList.forEach(p=>{
      const pid=p.id||p.name||p.sku||'';
      const pname=p.name||p.title||pid;
      const orig=p.original||p.orig||'';
      const nobg=p.nobg||p.no_bg||'';
      const fin=p.final||p.fin||'';
      pH+=`<div class="prod-row">
        <div class="prod-name">${pname}</div>
        <div class="img-gallery">`;
      if(orig)pH+=`<div class="img-card" onclick="event.stopPropagation();zoomImg('${orig}')"><img src="${orig}" loading="lazy" onerror="this.style.display='none'"/><span class="img-label">原始</span></div>`;
      if(nobg)pH+=`<div class="img-card" onclick="event.stopPropagation();zoomImg('${nobg}')"><img src="${nobg}" loading="lazy" onerror="this.style.display='none'"/><span class="img-label">去背景</span></div>`;
      if(fin)pH+=`<div class="img-card" onclick="event.stopPropagation();zoomImg('${fin}')"><img src="${fin}" loading="lazy" onerror="this.style.display='none'"/><span class="img-label">最终</span></div>`;
      pH+=`</div>
        <div class="img-actions">
          <button class="mini-btn" onclick="processImage('${pid}','rembg',this)">去背景</button>
          <button class="mini-btn" onclick="processImage('${pid}','full',this)">完整处理</button>
          <button class="mini-btn" onclick="processImage('${pid}','check',this)">合规检查</button>
        </div>
      </div>`;
    });
    document.getElementById('ms23-products').innerHTML=pH;
  }catch(e){
    document.getElementById('ms23-products').innerHTML=`<span style="font-size:10px;color:#ef4444;">加载失败: ${e.message}</span>`;
  }
}

// ================================================================
// v3.6: processImage - POST image processing
// ================================================================
async function processImage(imgId,action,btn){
  if(btn){btn.classList.add('busy'); btn.textContent='处理中...';}
  try{
    const r=await fetch('/api/images/'+imgId+'/process',{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({action})});
    const d=await r.json();
    if(d.error)toastMsg(action+' 失败: '+d.error);
    else if(d.steps)toastMsg(action+' 完成: '+d.steps.join(' \u2192 '));
    else toastMsg(action+' 完成');
  }catch(e){toastMsg('处理失败: '+e.message)}
  if(btn){btn.classList.remove('busy');btn.textContent=action;}
}

// ================================================================
// v3.6: renderDMEpisode - DM-6/7/8/9/10: render image gallery
// ================================================================
async function renderDMEpisode(msId,detail,ms){
  const epNum=msId.replace('DM-','').padStart(2,'0');
  const detailEl=document.getElementById('detail');
  let sec=`<div class="sec" id="dmep-sec-${epNum}"><h3>&#127916; 第${parseInt(epNum)}集 渲染画面</h3>`;
  sec+=`<div class="img-gallery" id="dmep-gal-${epNum}"><span class="loading" id="dmep-status-${epNum}">加载渲染图...</span></div>`;
  sec+=`</div>`;
  detailEl.insertAdjacentHTML('beforeend',sec);

  const galleryEl=document.getElementById('dmep-gal-'+epNum);
  const statusEl=document.getElementById('dmep-status-'+epNum);
  let found=0,imgs='';
  for(let i=1;i<=5;i++){
    const shot=String(i).padStart(2,'0');
    const url=`/api/render/ep${epNum}/shot_${shot}.png`;
    const ok=await checkImage(url);
    if(ok){imgs+=`<div class="img-card" onclick="event.stopPropagation();zoomImg('${url}')"><img src="${url}" loading="lazy" onerror="this.parentElement.remove()"/><span class="img-label">镜${shot}</span></div>`;found++;}
  }
  if(found>0){
    galleryEl.innerHTML=imgs;
  }else{
    galleryEl.innerHTML='<span style="font-size:10px;color:#555;">该集暂无渲染图 &middot; 运行 comfyui_renderer.py --episode '+parseInt(epNum)+'</span>';
  }
  if(statusEl)statusEl.remove();
}

refresh();setInterval(refresh,30000);
