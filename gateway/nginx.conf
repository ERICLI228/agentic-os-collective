# Agentic OS API Gateway - 完整 NGINX 配置
# 包含 worker 设置 + http 块 + upstream + server

worker_processes auto;
error_log /tmp/nginx-agentic-error.log warn;
pid /tmp/nginx-agentic.pid;

events {
    worker_connections 1024;
}

http {
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Upstream 定义
    upstream fastapi_v3 {
        server 127.0.0.1:5004;
        keepalive 32;
    }

    upstream openclaw_gateway {
        server 127.0.0.1:18789;
        keepalive 16;
    }

    upstream vue_data_panel {
        server 127.0.0.1:5173;
        keepalive 16;
    }

    upstream n8n_workflow {
        server 127.0.0.1:5678;
        keepalive 16;
    }

    # 速率限制区
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    server {
        listen 8081;
        server_name localhost;

        # 安全头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 日志
        access_log /tmp/nginx-agentic-access.log;

        # 请求体大小限制
        client_max_body_size 50M;

        # 健康检查
        location = /health {
            default_type application/json;
            return 200 '{"status":"ok","gateway":"nginx","timestamp":"$time_iso8601"}';
        }

        # API 路由 (FastAPI v3 主力)
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://fastapi_v3;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }

        # Vue 数据面板
        location /dashboard/ {
            proxy_pass http://vue_data_panel/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # OpenClaw Gateway (WebSocket 支持)
        location /openclaw/ {
            proxy_pass http://openclaw_gateway/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Swagger 文档
        location = /docs {
            proxy_pass http://fastapi_v3/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /redoc {
            proxy_pass http://fastapi_v3/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /openapi.json {
            proxy_pass http://fastapi_v3/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # n8n 工作流引擎 (子路径代理 + sub_filter 重写资源路径)
        location /n8n/ {
            proxy_pass http://n8n_workflow/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            # 重写 HTML 中的资源路径: /assets/ -> /n8n/assets/, /static/ -> /n8n/static/
            sub_filter_once off;
            sub_filter_types text/html application/javascript text/css;
            sub_filter '"/assets/' '"/n8n/assets/';
            sub_filter '"/static/' '"/n8n/static/';
            sub_filter '"/favicon.ico' '"/n8n/favicon.ico';
        }

        # n8n Webhook (保留前缀)
        location /webhook/ {
            proxy_pass http://n8n_workflow/webhook/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 根路径
        location = / {
            default_type application/json;
            return 200 '{"service":"Agentic OS Gateway","version":"3.0.0","endpoints":{"api":"/api/*","docs":"/docs","dashboard":"/dashboard/","openclaw":"/openclaw/","health":"/health"}}';
        }
    }
}
