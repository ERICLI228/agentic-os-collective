name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup language & install
        run: |
          if [ -f package.json ]; then
            echo "Node.js project detected."
            node -v
            npm -v
            npm ci
          elif [ -f requirements.txt ]; then
            echo "Python project detected."
            python --version
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No standard project detected; skipping language setup."
          fi

      - name: Run tests
        run: |
          if [ -f package.json ]; then
            npm test --if-present
          elif [ -f requirements.txt ]; then
            pytest -q || true
          else
            echo "No tests configured."
          fi
