  - id: caocao
    name: 曹操
    traits: [枭雄, 奸雄, 文武双全]
    voice_style: 男声，深沉有城府
    tts_voice: Sin-ji
    description: 中国古代中年男子，身长七尺，细眼长髯，身穿锦袍金甲，表情深沉有城府，一代枭雄之相
    default_scene: 许昌宫殿

scenes:
  桃园: 桃花盛开的花园，青石供桌，三柱香，乌牛白马祭品，夕阳余晖
  战场: 广袤平原，万马奔腾，刀枪如林，硝烟弥漫，旌旗招展
  中军帐: 古代军营大帐，地图悬挂，兵符陈列，烛光摇曳
  许昌宫殿: 汉代宫殿，高台广殿，铜雀飞檐，文武百官分列

controversy_rules:
  - id: caocao_villain
    pattern: 曹操奸雄
    severity: medium
    problem: 脸谱化反派，缺乏复杂性
    rewrite: 展现其文韬武略与理想抱负的一面
    keep: 权谋斗争的核心冲突

  - id: women_objectification
    pattern: 女性工具化
    severity: medium
    problem: 貂蝉等女性角色被工具化
    rewrite: 增加女性角色的主动性描写
    keep: 保留历史背景下的局限性

  - id: excessive_violence
    pattern: 过度战争暴力
    severity: medium
    problem: 斩首、屠杀等残酷描写
    rewrite: 远景处理，强调兵法谋略
    keep: 战争场面的视觉张力
