roles:
  - id: liubei
    name: 刘备
    traits: [仁德, 枭雄, 兄弟情深]
    voice_style: 男声，沉稳有磁性
    tts_voice: Sin-ji
    description: 中国古代中年男子，约40岁，面如冠玉，唇若涂脂，两耳垂肩，双手过膝，身穿锦袍，表情仁厚但有枭雄之志
    default_scene: 桃园

  - id: guanyu
    name: 关羽
    traits: [武圣, 忠义, 傲气]
    voice_style: 男声，威严有力
    tts_voice: Tingting
    description: 中国古代武将，面如重枣，丹凤眼，卧蚕眉，身长九尺，髯长二尺，手持青龙偃月刀，身穿绿袍金甲，威风凛凛
    default_scene: 战场

  - id: zhangfei
    name: 张飞
    traits: [勇猛, 鲁莽, 重情]
    voice_style: 男声，粗犷洪亮
    tts_voice: Tingting
    description: 中国古代武将，豹头环眼，燕颔虎须，声若巨雷，势如奔马，手持丈八蛇矛，身穿黑甲
    default_scene: 当阳桥

  - id: zhugeliang
    name: 诸葛亮
    traits: [智圣, 鞠躬尽瘁, 神机妙算]
    voice_style: 男声，温润睿智
