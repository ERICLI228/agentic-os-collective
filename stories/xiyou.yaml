genre: 神话冒险
era: 唐代
style: 奇幻搞笑
description: 唐僧师徒四人西天取经，历经九九八十一难的神话冒险

system_prompt: 你是一位资深编剧，熟悉西游记原著和现代观众审美。请基于以下标准进行剧本筛选和改编。

script_prompt: |
  生成一个30秒的西游记短视频剧本：{theme}
  要求：
  1. 奇幻搞笑风格，现代网感，适合抖音/快手
  2. 包含分镜描述（镜头、画面、对白/旁白、音效）
  3. 角色设定清晰
  4. 场景：神话/仙侠风格
  5. 时长：约30秒
  6. 输出格式：分镜脚本格式

video_prompt: |
  从以下剧本中提取3个关键画面描述，用于AI视频生成。
  每个描述格式："主体 + 动作 + 场景 + 镜头语言 + 氛围"
  每个描述不超过50字。
  剧本：{script}

selection_criteria:
  观众熟悉度: 民间流传度最高的桥段
  戏剧冲突强度: 妖魔斗法、师徒矛盾
  人物高光时刻: 孙悟空的名场面
  视觉表现力: 神话场景（天宫、地府、妖洞）

