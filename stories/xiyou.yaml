roles:
  - id: sunwukong
    name: 孙悟空
    traits: [齐天大圣, 神通广大, 桀骜不驯]
    voice_style: 男声，尖锐有力，带猴腔
    tts_voice: Tingting
    description: 中国古代神话人物，毛脸雷公嘴，身穿虎皮裙，头戴紧箍咒，手持如意金箍棒，身材精瘦矫健，表情灵动狡黠
    default_scene: 花果山

  - id: tangseng
    name: 唐僧
    traits: [慈悲, 迂腐, 坚定]
    voice_style: 男声，温和缓慢
    tts_voice: Sin-ji
    description: 唐代僧人，面容清秀慈善，身穿锦斓袈裟，头戴毗卢帽，手持九环锡杖，骑白龙马，表情慈悲庄严
    default_scene: 取经路

  - id: zhubajie
    name: 猪八戒
    traits: [好吃懒做, 贪色, 忠诚]
    voice_style: 男声，粗哑憨厚
    tts_voice: Tingting
    description: 猪头人身的妖怪，大肚腩，黑脸短毛，长嘴大耳，手持九齿钉耙，表情憨厚又狡黠
    default_scene: 高老庄

  - id: shawujing
    name: 沙悟净
    traits: [老实, 任劳任怨, 沉默]
    voice_style: 男声，低沉寡言
    tts_voice: Sin-ji
    description: 红发蓝脸、身高过丈的妖怪，颈悬九个骷髅头，手持降妖宝杖，表情木讷老实
    default_scene: 流沙河

scenes:
  花果山: 东胜神洲仙山，瀑布飞流，桃树成林，石洞水帘，猴子成群
  天宫: 云海之上，金碧辉煌的凌霄宝殿，仙鹤飞翔，祥云缭绕
  取经路: 荒山野岭，古道西风，残阳如血，远处有妖怪洞府
  火焰山: 八百里火焰山，赤地千里，热浪滚滚，寸草不生

controversy_rules:
  - id: tangseng_weakness
    pattern: 唐僧懦弱
    severity: medium
    problem: 唐僧形象过于懦弱无能
    rewrite: 增加其坚定信仰与慈悲智慧的一面
    keep: 师徒矛盾的核心张力

  - id: violence
    pattern: 妖怪吃人
    severity: high
    problem: 妖怪吃人情节过于血腥
    rewrite: 改为威胁或囚禁，不直接展示吃人
    keep: 妖怪的威胁感

  - id: gender_stereotypes
    pattern: 女性妖怪色诱
    severity: medium
    problem: 女性妖怪形象单一（色诱）
    rewrite: 增加女性妖怪的动机和背景故事
    keep: 保持戏剧冲突和斗法场面
