scenes:
  梁山聚义厅: 古代中国大厅，红砖金瓦，柱子上雕刻盘龙，设有虎皮交椅，墙上挂替天行道旗帜，两侧摆满酒肉宴席
  景阳冈: 中国北方山岭，树木茂密，山路崎岖，远处有酒店旗帜，近处有岩石和草丛，夕阳西下
  风雪山神庙: 古代密林，大雪纷飞，破旧山神庙，周围有草屋燃烧的痕迹，寒冷肃杀氛围
  大相国寺菜园: 古代寺庙后院，有菜圃、柳树、简陋草屋，周围有围墙，院内有石桌石凳
controversy_rules:
- id: zhaoan
  pattern: 宋江招安
  severity: high
  problem: 愚忠价值观，导致兄弟惨死
  rewrite: 改为"识破奸臣阴谋，保护梁山兄弟"
  keep: 兄弟情义、反抗压迫的核心精神
- id: likui_massacre
  pattern: 李逵滥杀
  severity: high
  problem: 不分军民乱砍，滥杀无辜
  rewrite: 改为"只攻击官兵，不伤百姓"
  keep: 鲁莽但保留人性底线
- id: panjinlian
  pattern: 潘金莲
  severity: medium
  problem: 女性角色被极度丑化
  rewrite: 增加动机合理性（反抗压迫）
  keep: 避免纯负面单一脸谱
- id: gore
  pattern: 血腥暴力
  severity: high
  problem: 剖腹挖心、活剐等过度血腥
  rewrite: 改为暗示或远景处理
  keep: 戏剧冲突，但减少血腥描写
- id: feudalism
  pattern: 封建糟粕
  severity: medium
  problem: 愚忠、愚孝、轻视人命
  rewrite: 弱化或转化价值观
  keep: 强调"反抗压迫、兄弟情义、替天行道"
