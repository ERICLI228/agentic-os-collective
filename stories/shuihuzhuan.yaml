description: 北宋末年，108位好汉聚义梁山泊，替天行道，反抗压迫的传奇故事
system_prompt: 你是一位资深编剧，熟悉水浒传原著和现代观众审美。请基于以下标准进行剧本筛选和改编。
script_prompt: '生成一个30秒的水浒传短视频剧本：{theme}

  要求：

  1. 幽默风格，现代网感，适合抖音/快手

  2. 包含分镜描述（镜头、画面、对白/旁白、音效）

  3. 角色设定清晰

  4. 场景：古代中国风格

  5. 时长：约30秒

  6. 输出格式：分镜脚本格式

  '
video_prompt: '从以下剧本中提取3个关键画面描述，用于AI视频生成。

  每个描述格式："主体 + 动作 + 场景 + 镜头语言 + 氛围"

  每个描述不超过50字。

  剧本：{script}

  '
selection_criteria:
  观众熟悉度: 民间流传度最高的桥段
  戏剧冲突强度: 情节起伏大、情感张力强
  人物高光时刻: 核心角色的成名战或转折点
  视觉表现力: 适合AI视频生成的场景（打斗、山水、市井）
