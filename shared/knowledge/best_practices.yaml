# 行业最佳实践知识库
# AI数字短剧 + TK东南亚运营

short剧制作最佳实践:
  推荐模板: "drama_pipeline"
  描述: "水浒传AI数字短剧全自动制作流水线"
  建议参数:
    剧本筛选:
      候选数: 3-5个
      质量评分: ">7.5"
      审核标准: "故事完整/角色立体/冲突强烈"
    争议检测:
      敏感词库: "政治/色情/暴力/谣言"
      风险等级: "高/中/低"
      处理策略: "修改/删除/跳过"
    角色设计:
      角色数: "3-5个"
      性格特征: "鲜明/反差/立体"
      人物关系: "复杂/冲突"
    视频生成:
      时长: "1-3分钟"
      分辨率: "1080p"
      风格: "短剧/电影感"
  常见问题:
    - "剧本太长：建议控制在5000字以内"
    - "角色不统一：建议固定人物画像"
    - "画面质量差：建议调整Prompt质量"
  最佳实践:
    - "使用结构化剧本格式"
    - "提前设计角色声线"
    - "预留人工审核节点"
    - "视频与音频分离制作"
  时间预估: "30分钟 - 2小时"

TK运营最佳实践:
  推荐模板: "tk_pipeline"
  描述: "TikTok东南亚5国3C品类自动运营"
  建议参数:
    品类监控:
      监测范围: "全品类/重点品类"
      更新频率: "每2小时"
      数据维度: "播放量/点赞量/评论数"
    数据分析:
      分析周期: "24小时/7天/30天"
      关键指标: "GMV/转化率/ROI"
    异常告警:
      告警阈值: "播放量>300万为爆款"
      通知方式: "飞书/邮件"
    数据上报:
      上报频率: "每日"
      报表格式: "JSON/CSV"
  常见问题:
    - "监控遗漏：建议设置多个数据源"
    - "告警泛滥：建议配置阈值过滤"
    - "数据异常：建议设置自动重采"
  最佳实践:
    - "关注ASMR/清洁类视频"
    - "定制类产品受欢迎"
    - "美观展示+音乐效果佳"
  时间预估: "实时 - 1小时"

命名规范:
  短剧任务:
    格式: "DS-[主题]-[日期]-[序号]"
    示例: "DS-复仇爽剧-20260411-001"
  TK任务:
    格式: "TK-[地区]-[品类]-[日期]-[序号]"
    示例: "TK-VN-美妆-20260411-001"
  规则:
    - "必须包含：项目标识+日期"
    - "建议包含：主题关键词"
    - "避免：空格/特殊字符"
    - "长度限制: 不超过50字符"

提醒设置:
  决策超时: 24
  执行超时: 3600
  检查间隔: 3600