# 行业最佳实践知识库
# AI数字短剧 + TK东南亚运营

short剧制作最佳实践:
  推荐模板: "drama_pipeline"
  描述: "水浒传AI数字短剧全自动制作流水线"
  建议参数:
    剧本筛选:
      候选数: 3-5个
      质量评分: ">7.5"
      审核标准: "故事完整/角色立体/冲突强烈"
    争议检测:
      敏感词库: "政治/色情/暴力/谣言"
      风险等级: "高/中/低"
      处理策略: "修改/删除/跳过"
    角色设计:
      角色数: "3-5个"
      性格特征: "鲜明/反差/立体"
      人物关系: "复杂/冲突"
    视频生成:
      时长: "1-3分钟"
      分辨率: "1080p"
      风格: "短剧/电影感"
  常见问题:
    - "剧本太长：建议控制在5000字以内"
    - "角色不统一：建议固定人物画像"
    - "画面质量差：建议调整Prompt质量"
  最佳实践:
    - "使用结构化剧本格式"
    - "提前设计角色声线"
    - "预留人工审核节点"
    - "视频与音频分离制作"
  时间预估: "30分钟 - 2小时"

TK运营最佳实践:
   推荐模板: "tk_pipeline"
   描述: "TikTok东南亚5国3C品类自动运营"
   建议参数:
     品类监控:
       监测范围: "全品类/重点品类"
       更新频率: "每2小时"
       数据维度: "播放量/点赞量/评论数"
     数据分析:
       分析周期: "24小时/7天/30天"
       关键指标: "GMV/转化率/ROI"
     异常告警:
       告警阈值: "播放量>300万为爆款"
       通知方式: "飞书/邮件"
     数据上报:
       上报频率: "每日"
       报表格式: "JSON/CSV"
   常见问题:
     - "监控遗漏：建议设置多个数据源"
     - "告警泛滥：建议配置阈值过滤"
     - "数据异常：建议设置自动重采"
   最佳实践:
     - "关注ASMR/清洁类视频"
     - "定制类产品受欢迎"
     - "美观展示+音乐效果佳"
   时间预估: "实时 - 1小时"

# ═══════════════════════════════════════════
# 🚫 五条红线（硬约束）
# src: PRD-v3.5 §第五部分
# ═══════════════════════════════════════════

五条红线:
  规则1_禁止自动发布:
    描述: "任何发布动作必须检查 MIAOSHOW_PUBLISH_ENABLED=true 且任务JSON中有 human_approved: true"
    检查点: "publish_gate.check_approval(task_id)"
    违反处理: "Agent 停止执行，记录违规日志"
  规则2_禁止跳过决策节点:
    描述: "pipeline 中 decision_point: true 的阶段，必须等到 /api/decision 被调用才推进"
    检查方法: "milestone_tracker.get_state(task_id).allowed_next 为空时应阻塞"
    违反处理: "任务状态设为 failed"
  规则3_禁止硬编码密钥:
    描述: "所有 API Key 从 shared/config.py 读取，config.py 从 .env 读取"
    检查方法: "代码 review 中 grep -r 'sk-' --include='*.py' 不应命中"
    违反处理: "代码 review 不通过"
  规则4_禁止跨业务线调度:
    描述: "执行前必须调用 skill_loader.validate_task_skill(task_id, skill_name)"
    检查方法: "validate_task_skill 返回 False 时拒绝执行"
    违反处理: "路由拦截报错"
  规则5_禁止覆盖已有数据:
    描述: "写入前检查目标文件存在，存在时追加时间戳后缀"
    检查方法: "保存前 os.path.exists(target) 检查"
    违反处理: "写入失败，保留原文件"

# ═══════════════════════════════════════════
# 🔗 三决策节点（Agent 必须在此停等）
# src: PRD-v3.5 §第三部分
# ═══════════════════════════════════════════

三决策节点:
  节点A_市场判断:
    id: "MS-1.5"
    description: "数据采集完成后评估品类机会"
    你必须看到: "五维数据 — 竞品饱和度/利润空间/供应链/季节性/达人潜力"
    Agent必须等待: "/api/decision 被调用，action=值得做/换品类/不做"
    未决策后果: "系统暂停，每天飞书提醒一次"
    超时: "48小时"
  节点B_选品审核:
    id: "MS-2"
    description: "Agent 完成选品分析后推荐 TOP3-5 SKU"
    你必须看到: "推荐排行 — 每商品1688价格/预估利润/竞品数量/对抗审核评分"
    Agent必须等待: "/api/decision 被调用，action=approved/modify/rejected"
    未决策后果: "系统暂停，飞书每日提醒"
    超时: "24小时"
  节点C_发布审批:
    id: "MS-4"
    description: "商品准备好上架到 TK 店铺"
    你必须看到: "发布预览 — 商品名/店铺/售价/预估利润/预览图"
    Agent必须等待: "/api/decision 被调用，action=approved/test_one/rejected"
    未决策后果: "绝不发布，哪怕等一个月"
    超时: "24小时"
    publish_gate: true

# ═══════════════════════════════════════════
# 📤 发布门禁（双重硬约束）
# src: PRD-v3.5 §FR-BS-013 + publish_gate.py
# ═══════════════════════════════════════════

发布门禁:
  条件1:
    key: "MIAOSHOW_PUBLISH_ENABLED"
    value: "true"
    source: ".env"
    描述: "环境变量开关，默认 false"
  条件2:
    key: "human_approved"
    value: "true"
    source: "任务JSON — {task_id}/decision.json"
    描述: "节点C发布审批通过后写入"
  阻断行为:
    异常: "PublishBlockedError"
    代码位置: "shared/publish_gate.py:check_approval()"
    阻断后: "飞书推送告警 + 日志记录 + 等待重新审批"

命名规范:
  短剧任务:
    格式: "DS-[主题]-[日期]-[序号]"
    示例: "DS-复仇爽剧-20260411-001"
  TK任务:
    格式: "TK-[地区]-[品类]-[日期]-[序号]"
    示例: "TK-VN-美妆-20260411-001"
  规则:
    - "必须包含：项目标识+日期"
    - "建议包含：主题关键词"
    - "避免：空格/特殊字符"
    - "长度限制: 不超过50字符"

会话归档最佳实践:
  推荐工具: "scripts/archive-session.sh"
  描述: "基于Clicky/CPR理念的会话归档机制"
  核心功能:
    决策提取: "从会话中自动提取含关键词的决策语句"
    结构化日志: "YAML frontmatter + [[wikilinks]] 格式"
    自动归档: "会话结束或输入/archive时触发"
  输出:
    - "wiki/log.md": 结构化操作日志
    - "wiki/outputs/session-{timestamp}.md": 完整归档
    - "workspace/memory/timeline.md": 决策时间线
  最佳实践:
    - "使用[[wikilinks]]标注概念和实体"
    - "每次回答后标记关键决策"
    - "会话结束时执行archive-session.sh"
  时间预估: "30秒 - 2分钟"